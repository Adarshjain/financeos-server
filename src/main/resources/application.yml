spring:
  application:
    name: financeos-backend

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@financeos_high?TNS_ADMIN=${TNS_ADMIN}}
    username: ${DB_USERNAME:ADMIN}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      data-source-properties:
        oracle.jdbc.timezoneAsRegion: "false"

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 24h

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  devtools:
    restart:
      enabled: true
      poll-interval: 1s
      quiet-period: 400ms
    livereload:
      enabled: true

server:
  port: ${SERVER_PORT:6969}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${COOKIE_SECURE:false}
        same-site: lax
        max-age: 86400
        name: FINANCEOS_SESSION

# Application-specific configuration
app:
  encryption:
    key: ${ENCRYPTION_KEY:your-32-byte-base64-encoded-key-here==}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3001}
  ui-path: ${UI_PATH:http://localhost:3001}

# Gmail OAuth configuration
gmail:
  oauth:
    client-id: ${GMAIL_CLIENT_ID:}
    client-secret: ${GMAIL_CLIENT_SECRET:}
    redirect-uri: ${GMAIL_REDIRECT_URI:http://localhost:6969/api/v1/gmail/oauth/callback}
  ingest:
    enabled: ${GMAIL_INGEST_ENABLED:true}
    cron: ${GMAIL_INGEST_CRON:0 0 10-22/2 * * *}
    first-backfill-days: ${GMAIL_INGEST_BACKFILL_DAYS:30}
    zone: ${GMAIL_INGEST_ZONE:Asia/Kolkata}

# LLM Provider Layer configuration
llm:
  chain: ${LLM_CHAIN:gemini,cerebras,groq,openrouter}
  retry:
    attempts-per-provider: ${LLM_ATTEMPTS_PER_PROVIDER:2}
    base-delay-ms: 1000
    max-delay-ms: 8000
    cooldown-ms: 60000
  providers:
    gemini:
      type: gemini
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
      timeout-ms: ${GEMINI_TIMEOUT_MS:30000}
      batch-size: ${GEMINI_BATCH_SIZE:200}
    gemini-statement:           # same key, statement model — used only by the task override
      type: gemini
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_STATEMENT_MODEL:gemini-2.5-flash-lite}
      timeout-ms: ${GEMINI_TIMEOUT_MS:30000}
      batch-size: ${GEMINI_BATCH_SIZE:200}
    cerebras:
      type: openai
      base-url: https://api.cerebras.ai/v1
      api-key: ${CEREBRAS_API_KEY:}
      model: ${CEREBRAS_MODEL:gpt-oss-120b}
      timeout-ms: 30000
      batch-size: ${CEREBRAS_BATCH_SIZE:100}
    groq:
      type: openai
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:openai/gpt-oss-120b}
      timeout-ms: 30000
      batch-size: ${GROQ_BATCH_SIZE:100}
    openrouter:
      type: openai
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openrouter/free}
      structured-output: json-object     # :free routes vary; don't assume json_schema support
      timeout-ms: 45000
      batch-size: ${OPENROUTER_BATCH_SIZE:40}
    # Self-hosted (future) — config only, no code change:
    # ampere:
    #   type: openai
    #   base-url: http://<ampere-ip>:11434/v1
    #   allow-no-key: true
    #   model: qwen3:8b
  tasks:
    statement-parse:
      chain: ${LLM_STATEMENT_CHAIN:gemini-statement,cerebras}   # large payloads; Groq's free
                                                                 # TPM (~12k) can't fit them

# Google SSO configuration
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:${GMAIL_CLIENT_ID:}}
    client-secret: ${GOOGLE_CLIENT_SECRET:${GMAIL_CLIENT_SECRET:}}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:6969/api/v1/auth/google/callback}

debug: true

